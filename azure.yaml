name: style-guide-foundry
metadata:
  template: style-guide-foundry@1.0.0

infra:
  provider: bicep
  path: infra

services:
  function:
    project: ./function
    language: js
    host: function
    hooks:
      postdeploy:
        run: bash ../scripts/configure-foundry-agent-and-function-settings.sh

  app-ui:
    project: ./app-ui
    language: js
    host: appservice
    hooks:
      prepackage:
        run: npm install && npm run build
      postdeploy:
        run: | 
          bash ../scripts/bump-manifest-version.sh
          bash ../scripts/enable-static-web.sh
          bash ../scripts/sync-manifest-from-azd.sh
          bash ../scripts/upload-icons-to-web-container.sh
